[files]
extend-exclude = [
    "paper/*.txt",
    "paper/*.log",
    "consolidation/",
    # Benchmark inputs and LLM outputs contain proper nouns (Big Sur,
    # Yosemite, ...) and hallucinated spellings we must NOT rewrite —
    # doing so would corrupt ground truth and benchmark parity.
    "data/*.jsonl",
    "data/*.json",
]

[default.extend-words]
# "BA" = Balanced Accuracy (ML metric)
BA = "BA"
# regex pattern fragments
ure = "ure"
# variable name (note dict)
nd = "nd"
# HSA = Heterogeneous System Architecture (AMD ROCm env var)
HSA = "HSA"
# hash ID fragments in benchmark logs
abd = "abd"
ded = "ded"
caf = "caf"
aded = "aded"
# variable names in rust_answer_normalizer: py/pn = predicted yes/no
pn = "pn"
