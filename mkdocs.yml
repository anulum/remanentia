    - answer_extractor: api/answer_extractor.md
    - answer_normalizer: api/answer_normalizer.md
    - temporal_graph: api/temporal_graph.md
    - entity_extractor: api/entity_extractor.md
    - observer: api/observer.md
    - reflector: api/reflector.md
    - arcane_retriever: api/arcane_retriever.md
    - fact_decomposer: api/fact_decomposer.md
    - date_normalizer: api/date_normalizer.md
    - temporal_relation: api/temporal_relation.md
