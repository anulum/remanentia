site_name: Remanentia
site_url: https://remanentia.com/docs
site_description: Persistent AI memory with SNN-orchestrated consolidation
site_author: Miroslav Šotek
repo_url: https://github.com/anulum/remanentia
repo_name: anulum/remanentia

theme:
  name: material
  logo: assets/anulum_logo.png
  favicon: assets/anulum_logo_company.jpg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md

markdown_extensions:
  - tables
  - admonitions
  - pymdownx.highlight
  - pymdownx.superfences
