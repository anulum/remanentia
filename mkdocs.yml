site_name: Remanentia
site_url: https://remanentia.com/docs
site_description: Persistent AI memory with SNN-orchestrated consolidation
site_author: Miroslav Šotek
repo_url: https://github.com/anulum/remanentia
repo_name: anulum/remanentia
copyright: "© 1996–2026 Miroslav Šotek / ANULUM · www.anulum.li · protoscience@anulum.li"

theme:
  name: material
  logo: assets/anulum_logo.png
  favicon: assets/anulum_logo_company.jpg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Tutorials:
    - Quick Start: tutorials/quickstart.md
    - Knowledge Store: tutorials/knowledge_store_tutorial.md
    - Temporal Queries: tutorials/temporal_tutorial.md
    - Notebook Walkthrough: tutorials/notebook_walkthrough.md
  - Guides:
    - Learning Path: guides/learning-path.md
    - Getting Started: guides/getting-started.md
    - User Manual: guides/USER_MANUAL.md
    - Integration Guide: guides/INTEGRATION_GUIDE.md
    - Container Deployment: guides/container_deployment.md
    - Performance Tuning: guides/PERFORMANCE_TUNING.md
    - Local LLM Setup: guides/local_llm_setup.md
  - Model Cards:
    - Overview: models/README.md
    - Embedding (C1): models/embedding.md
    - Cross-Encoder (C2): models/cross_encoder.md
    - Relation Classifier (C3): models/relation.md
    - Date Normaliser (C4): models/date_normalizer.md
    - Fact Validity (C5): models/fact_validity.md
  - API Reference:
    - memory_index: api/memory_index.md
    - memory_sources: api/memory_sources.md
    - store_paths: api/store_paths.md
    - store_manifest: api/store_manifest.md
    - store_sources: api/store_sources.md
    - claim_axes: api/claim_axes.md
    - memory_recall: api/memory_recall.md
    - recall_calibration: api/recall_calibration.md
    - retrieved_context: api/retrieved_context.md
    - full_s_diagnostics: api/full_s_diagnostics.md
    - benchmark_evidence: api/benchmark_evidence.md
    - benchmark_report: api/benchmark_report.md
    - compiled_memory: api/compiled_memory.md
    - mcp_server: api/mcp_server.md
    - knowledge_store: api/knowledge_store.md
