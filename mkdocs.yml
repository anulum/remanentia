site_name: Remanentia
site_url: https://remanentia.com/docs
site_description: Persistent AI memory with SNN-orchestrated consolidation
site_author: Miroslav Šotek
repo_url: https://github.com/anulum/remanentia
repo_name: anulum/remanentia
copyright: "© 1996–2026 Miroslav Šotek / ANULUM · www.anulum.li · protoscience@anulum.li"

theme:
  name: material
  logo: assets/anulum_logo.png
  favicon: assets/anulum_logo_company.jpg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Guides:
    - Getting Started: guides/getting-started.md
    - User Manual: guides/USER_MANUAL.md
    - Integration Guide: guides/INTEGRATION_GUIDE.md
    - Performance Tuning: guides/PERFORMANCE_TUNING.md
  - API Reference:
    - memory_index: api/memory_index.md
    - mcp_server: api/mcp_server.md
    - knowledge_store: api/knowledge_store.md
    - consolidation_engine: api/consolidation_engine.md
    - answer_extractor: api/answer_extractor.md
    - temporal_graph: api/temporal_graph.md
    - entity_extractor: api/entity_extractor.md
    - observer: api/observer.md
    - CLI: api/cli.md
  - Architecture:
    - Overview: architecture/architecture.md
  - Benchmarks:
    - LOCOMO: benchmarks/LOCOMO.md
  - Research:
    - SNN Consolidation: research/snn_consolidation.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
