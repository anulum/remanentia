site_name: Remanentia
site_url: https://www.remanentia.com/docs
site_description: Local-first, auditable memory for AI agents and knowledge-intensive software
site_author: Miroslav Šotek
repo_url: https://github.com/anulum/remanentia
repo_name: anulum/remanentia
copyright: "© 1996–2026 Miroslav Šotek / ANULUM · www.anulum.li · protoscience@anulum.li"

theme:
  name: material
  logo: assets/anulum_logo.png
  favicon: assets/anulum_logo_company.jpg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            preload_modules:
              - consolidation_summary_dag
              - memory_index_models
            show_source: true
            show_root_heading: true
            members_order: source

