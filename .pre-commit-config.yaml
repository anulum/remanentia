repos:
  - repo: local
    hooks:
      - id: public-leak-audit
        name: public leak audit
        entry: python tools/public_leak_audit.py
        language: system
        pass_filenames: false
      - id: api-docs-wiring
        name: api docs wiring
        entry: python tools/check_api_docs_wiring.py
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: https://github.com/crate-ci/typos
    rev: v1.29.5
    hooks:
      - id: typos
