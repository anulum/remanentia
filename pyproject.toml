[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "remanentia"
version = "0.5.0"
description = "Local-first, auditable memory for AI agents and knowledge-intensive software"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
authors = [
    {name = "Miroslav Šotek", email = "protoscience@anulum.li"},
]
keywords = [
    "memory", "ai-agents", "consolidation", "snn", "stdp",
    "entity-graph", "retrieval", "neuromorphic", "spiking-neural-network",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",

    "Programming Language :: Python :: 3",
    "Programming Language :: Rust",
]

dependencies = [
    "defusedxml>=0.7.1",
    "jsonschema>=4.20",
    "numpy>=1.24",
]

[project.optional-dependencies]
retrieval = ["scikit-learn>=1.3"]
embedding = ["sentence-transformers>=3.0"]
gpu = ["torch>=2.0"]
temporal = ["sentence-transformers>=3.0", "torch>=2.0", "transformers>=4.45"]
sparse = ["scipy>=1.11"]
api = ["fastapi>=0.100", "uvicorn>=0.20"]
bus = ["synapse-channel>=0.66.0"]
seal = ["scpn-studio-platform>=0.10,<0.11; python_version >= '3.12'"]
local = ["tomli>=2.0; python_version < '3.11'"]
guarded = [
    "tomli>=2.0; python_version < '3.11'",
    "director-ai[nli]>=3.11",
]
all = [
    "scikit-learn>=1.3",
    "sentence-transformers>=2.0",
    "scipy>=1.11",
    "fastapi>=0.100",
    "uvicorn>=0.20",
    "synapse-channel>=0.66.0",
    "tomli>=2.0; python_version < '3.11'",
    "scpn-studio-platform>=0.10,<0.11; python_version >= '3.12'",
]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "jsonschema>=4.20",
    "httpx>=0.25",
    "openai>=1.0,<3.0",
    "synapse-channel>=0.66.0",
    "scpn-studio-platform>=0.10,<0.11; python_version >= '3.12'",
]

[project.scripts]
remanentia = "cli:main"
remanentia-claim-schema = "claim_schema:main"
remanentia-benchmark-manifest = "benchmark_manifest:main"
remanentia-benchmark-report = "benchmark_report:main"
remanentia-efficiency-frontier = "efficiency_frontier:main"
remanentia-feed-ingest = "feed_ingest:main"
remanentia-write-discipline = "write_discipline:main"
remanentia-scorecard = "scorecard_report:main"
remanentia-provenance-export = "provenance_export:main"
remanentia-full-s-diagnostics = "full_s_diagnostics:main"
remanentia-recall-calibration = "recall_calibration:main"
remanentia-store-manifest = "store_manifest:main"
remanentia-store-sources = "store_sources:main"
remanentia-snn-memory = "snn_memory.cli:main"
remanentia-snn-source-universe = "snn_memory.source_universe:main"
remanentia-snn-cue-materializer = "snn_memory.cue_materializer:main"

[project.urls]
Homepage = "https://www.remanentia.com"
Repository = "https://github.com/anulum/remanentia"
Documentation = "https://anulum.github.io/remanentia/"
Issues = "https://github.com/anulum/remanentia/issues"
Changelog = "https://github.com/anulum/remanentia/blob/main/CHANGELOG.md"
Discussions = "https://github.com/anulum/remanentia/discussions"
Author = "https://www.anulum.li"

