name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/**", "mkdocs.yml", "*.py", "**/*.py"]

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          pip install "mkdocs==1.6.1" "mkdocs-material==9.5.49" "mkdocstrings[python]==0.27.0"
          pip install -e .

      - name: Build and deploy
        run: mkdocs gh-deploy --force
