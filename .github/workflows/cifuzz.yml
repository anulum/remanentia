name: CIFuzz

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths: ["*.py", "**/*.py", "tests/**"]

permissions: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_normalize_answer, fuzz_extract_entities, fuzz_percentage_regex, fuzz_date_parse, fuzz_tokenize]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "hypothesis==6.122.3" "pytest>=8.0" "numpy>=1.24"
          pip install -e .

      - name: Run fuzzer (${{ matrix.target }})
        run: |
          python -m pytest fuzz/${{ matrix.target }}.py -x -q --tb=short
        timeout-minutes: 5
