name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths: ["*.py", "**/*.py", "tests/**"]

permissions: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_normalize_answer, fuzz_extract_entities, fuzz_percentage_regex, fuzz_date_parse, fuzz_tokenize]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "hypothesis==6.122.3" "pytest>=8.0" "numpy>=1.24"
          pip install -e .

      - name: Run fuzzer (${{ matrix.target }})
        run: |
          python -m pytest fuzz/${{ matrix.target }}.py -x -q --tb=short
        timeout-minutes: 5
