name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths: ["*.py", "tests/**"]

permissions: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_normalize_answer, fuzz_extract_entities, fuzz_percentage_regex, fuzz_date_parse, fuzz_tokenize]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "hypothesis==6.122.3" "pytest>=8.0" "numpy>=1.24"
          pip install -e .

      - name: Run fuzzer (${{ matrix.target }})
        run: |
          python -m pytest fuzz/${{ matrix.target }}.py -x -q --tb=short
        timeout-minutes: 5
