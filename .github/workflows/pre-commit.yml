name: Pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      # Run the tool directly: pre-commit/action v3 transitively invokes
      # actions/cache by a mutable tag, which violates SHA-pinning policy.
      - name: Install pre-commit
        run: python -m pip install "pre-commit==4.5.1"

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
