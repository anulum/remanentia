name: Pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      # Run the tool directly: pre-commit/action v3 transitively invokes
      # actions/cache by a mutable tag, which violates SHA-pinning policy.
      - name: Install pre-commit
        run: python -m pip install "pre-commit==4.5.1"

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
