name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=memory_index --cov=consolidation_engine --cov=entity_extractor --cov=answer_extractor --cov=mcp_server --cov=memory_recall --cov=cli --cov=api --cov-report=term-missing --cov-fail-under=70 -q --tb=short
