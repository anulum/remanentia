name: CI

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "tests/**"
      - "pyproject.toml"
      - "rust_*/**"
      - "remanentia_topology/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install "ruff==0.15.6" "bandit==1.9.4" "mypy>=1.19.1,<2.0" "reuse==5.0.2"

      - name: REUSE compliance
        # REUSE 3.3 / REUSE.toml — every file must have an SPDX-License-
        # Identifier either inline or via REUSE.toml path globs. Running
        # `reuse lint` here catches stray files that landed without a
        # licence marker (common on docs assets, benchmark outputs).
        run: reuse lint

      - name: Ruff check
        run: ruff check . --exclude=".venv*,build,dist,site,training,experimental,bench_*.py,experiments,encoding.py" --output-format=github

      - name: Ruff format check
        run: ruff format --check . --exclude=".venv*,build,dist,site,training,experimental,bench_*.py,experiments,encoding.py"

      - name: Mypy type check (advisory)
        continue-on-error: true
        run: mypy memory_index.py mcp_server.py recall_ledger.py recall_outcome_tracker.py recall_gate.py bus_recall.py finding_ingest.py feed_ingest.py finding_envelope.py index_freshness.py consolidation_engine.py cli.py api.py api_server.py answer_extractor.py answer_normalizer.py knowledge_store.py temporal_graph.py entity_extractor.py observer.py reflector.py memory_recall.py arcane_retriever.py fact_decomposer.py coverage_accuracy.py no_egress_audit.py lineage_completeness.py world_class_scorecard.py scorecard_report.py lean_context.py observed_context.py answer_confidence.py discipline_impact.py hypothesis_checkpoint.py --ignore-missing-imports --explicit-package-bases

      - name: Bandit SAST
        # B301 (pickle.load) + B403 (import pickle) re-enabled 2026-04-17
        # after removing pickle from all production loaders (runtime now
        # refuses legacy pickle; operators run tools/migrate_pickle_to_npz.py).
        run: bandit -r memory_index.py mcp_server.py recall_ledger.py recall_outcome_tracker.py recall_gate.py bus_recall.py finding_ingest.py feed_ingest.py finding_envelope.py index_freshness.py consolidation_engine.py cli.py api.py api_server.py api_security.py answer_extractor.py answer_normalizer.py knowledge_store.py temporal_graph.py entity_extractor.py observer.py reflector.py memory_recall.py arcane_retriever.py fact_decomposer.py date_normalizer.py device_utils.py -s B101,B110,B112,B310,B311,B324,B404,B603,B607,B615 -q

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.0.1
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,all]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ --cov=. --cov-config=pyproject.toml --cov-report=term-missing --cov-fail-under=100 -q --tb=short

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        crate:
          - rust_recall
          - remanentia_topology
          - rust_active_retrieval
          - rust_aggregate_precompute
          - rust_answer_extractor
          - rust_answer_normalizer
          - rust_consolidation
          - rust_entity_extractor
          - rust_fact_decomposer
          - rust_knowledge_store
          - rust_pii_redactor
          - rust_retrieve
          - rust_search
          - rust_skill_extractor
          - rust_stdp
          - rust_temporal
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Cargo format
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --check

      - name: Cargo tests
        working-directory: ${{ matrix.crate }}
        run: cargo test

      - name: Cargo clippy
        working-directory: ${{ matrix.crate }}
        run: cargo clippy -- -D warnings

  rust-parity:
    # Required: build the compiled Rust extensions and run the suite against the fast
    # path, so the Rust<->Python parity / e2e tests — which importorskip the extension
    # and otherwise NEVER run in CI — execute for real. The pure-Python test matrix and
    # the 100 % coverage gate stay green on the fallback; this job enforces that the
    # compiled fast path stays bit-parity with the Python reference. (It was advisory
    # while the initial parity gaps in BACKLOG L2.8 were fixed — 2026-07-07 — and is now
    # a blocking check.) Each crate is a bare cargo cdylib; the module name is its
    # `[lib] name` (NOT the directory) — rust_recall -> remanentia_recall,
    # rust_stdp -> arcane_stdp — read from Cargo.toml; copy lib<name>.so -> <name>.so
    # onto sys.path.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.0.1
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,all]"

      - name: Build Rust extensions
        run: |
          set -euo pipefail
          for crate in rust_recall remanentia_topology rust_active_retrieval \
                       rust_aggregate_precompute rust_answer_extractor \
                       rust_answer_normalizer rust_consolidation rust_entity_extractor \
                       rust_fact_decomposer rust_knowledge_store rust_pii_redactor \
                       rust_retrieve rust_search rust_skill_extractor rust_stdp \
                       rust_temporal; do
            cargo build --release --manifest-path "$crate/Cargo.toml"
            modname=$(sed -n '/\[lib\]/,/^\[/{s/^name *= *"\(.*\)"/\1/p;}' "$crate/Cargo.toml")
            if [ -z "$modname" ]; then echo "no [lib] name in $crate/Cargo.toml" >&2; exit 1; fi
            cp "$crate/target/release/lib${modname}.so" "./${modname}.so"
            echo "built $crate -> ${modname}.so"
          done

      - name: Run the suite against the Rust fast path
        run: python -m pytest tests/ -q --tb=short
