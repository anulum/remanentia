name: CI

on:
  push:
    branches: [main]
    paths: ["*.py", "tests/**", "pyproject.toml"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff bandit

      - name: Ruff check
        run: ruff check memory_index.py mcp_server.py consolidation_engine.py cli.py api.py answer_extractor.py answer_normalizer.py knowledge_store.py temporal_graph.py entity_extractor.py observer.py reflector.py memory_recall.py tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check memory_index.py mcp_server.py consolidation_engine.py cli.py api.py answer_extractor.py answer_normalizer.py knowledge_store.py temporal_graph.py entity_extractor.py observer.py reflector.py memory_recall.py tests/

      - name: Bandit SAST
        run: bandit -r memory_index.py mcp_server.py consolidation_engine.py cli.py api.py answer_extractor.py knowledge_store.py -s B101,B110,B301,B310,B311,B404,B603,B607 -q

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ --cov=. --cov-config=pyproject.toml --cov-report=term-missing --cov-fail-under=70 -q --tb=short
