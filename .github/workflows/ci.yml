name: CI

on:
  push:
    branches: [main]
    paths: ["*.py", "tests/**", "pyproject.toml", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install "ruff==0.15.6" "bandit==1.9.4" "mypy>=1.19.1,<2.0" "reuse==5.0.2"

      - name: REUSE compliance
        # REUSE 3.3 / REUSE.toml — every file must have an SPDX-License-
        # Identifier either inline or via REUSE.toml path globs. Running
        # `reuse lint` here catches stray files that landed without a
        # licence marker (common on docs assets, benchmark outputs).
        run: reuse lint

      - name: Ruff check
        run: ruff check . --exclude=".venv*,build,dist,site,training,experimental,bench_*.py,experiments,build_memory_standalone.py,encoding.py" --output-format=github

      - name: Ruff format check
        run: ruff format --check . --exclude=".venv*,build,dist,site,training,experimental,bench_*.py,experiments,build_memory_standalone.py,encoding.py"

      - name: Mypy type check (advisory)
        continue-on-error: true
        run: mypy memory_index.py mcp_server.py recall_ledger.py consolidation_engine.py cli.py api.py api_server.py answer_extractor.py answer_normalizer.py knowledge_store.py temporal_graph.py entity_extractor.py observer.py reflector.py memory_recall.py arcane_retriever.py fact_decomposer.py --ignore-missing-imports --explicit-package-bases

      - name: Bandit SAST
        # B301 (pickle.load) + B403 (import pickle) re-enabled 2026-04-17
        # after removing pickle from all production loaders (runtime now
        # refuses legacy pickle; operators run tools/migrate_pickle_to_npz.py).
        run: bandit -r memory_index.py mcp_server.py recall_ledger.py consolidation_engine.py cli.py api.py api_server.py api_security.py answer_extractor.py answer_normalizer.py knowledge_store.py temporal_graph.py entity_extractor.py observer.py reflector.py memory_recall.py arcane_retriever.py fact_decomposer.py date_normalizer.py device_utils.py -s B101,B110,B112,B310,B311,B324,B404,B603,B607,B615 -q

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.0.1
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,all]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ --cov=. --cov-config=pyproject.toml --cov-report=term-missing --cov-fail-under=100 -q --tb=short
