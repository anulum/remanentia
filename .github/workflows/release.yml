name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create release + upload assets
      id-token: write      # sigstore keyless signing + attestations
      attestations: write  # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          pip install "build==1.2.2"
          python -m build

      - name: Install built sdist for accurate SBOM
        # cyclonedx-py environment reports only what is installed in the
        # active venv. Installing the sdist first means the SBOM reflects
        # the release artefact's transitive dependency closure, not just
        # the build tooling.
        run: |
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --upgrade pip==25.0.1
          /tmp/sbom-venv/bin/pip install dist/*.tar.gz

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          /tmp/sbom-venv/bin/pip install "cyclonedx-bom==4.6.0"
          /tmp/sbom-venv/bin/cyclonedx-py environment \
            -o sbom.cyclonedx.json --output-format json /tmp/sbom-venv

      - name: Compute artefact digests
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > ../sha256sums.txt
          cd ..
          echo "sha256sums.txt:"
          cat sha256sums.txt

      - name: Sign release artefacts (sigstore keyless)
        # sigstore-python creates .sigstore bundles per file. The bundle
        # is a JSON blob that verifies both the artefact digest and the
        # signer identity (this workflow, on this repo, on this commit).
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: |
            dist/*.tar.gz
            dist/*.whl
            sbom.cyclonedx.json
            sha256sums.txt
          verify: true
          verify-cert-identity: https://github.com/anulum/remanentia/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}
          verify-oidc-issuer: https://token.actions.githubusercontent.com
          release-signing-artifacts: false
          upload-signing-artifacts: true

      - name: Attest build provenance (SLSA via GitHub)
        # Emits a GitHub-native SLSA provenance attestation bundle alongside
        # the sigstore signatures. Verifiable with `gh attestation verify`.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            sbom.cyclonedx.json
            sha256sums.txt
            *.sigstore
